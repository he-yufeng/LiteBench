<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LiteBench</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #e4e4e4;
    --accent: #2563eb;
    --good: #16a34a;
    --bad: #dc2626;
    --cell-bg: #fff;
    --code-bg: #f4f4f5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #e4e4e4;
      --muted: #888;
      --border: #2a2a2a;
      --accent: #3b82f6;
      --cell-bg: #161616;
      --code-bg: #1a1a1a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.5;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 16px;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; }
  header .tag { color: var(--muted); font-size: 13px; }
  nav { display: flex; gap: 4px; padding: 0 16px; border-bottom: 1px solid var(--border); }
  nav button {
    padding: 10px 14px; background: none; border: 0; color: var(--muted);
    font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent;
  }
  nav button.active { color: var(--fg); border-bottom-color: var(--accent); font-weight: 600; }
  main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td {
    text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th { font-weight: 600; color: var(--muted); background: var(--cell-bg); }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover { background: var(--cell-bg); }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; }
  .acc { font-weight: 600; }
  .acc.good { color: var(--good); }
  .acc.bad { color: var(--bad); }
  .chip {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    background: var(--cell-bg); border: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
  }
  .muted { color: var(--muted); }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty code { background: var(--code-bg); padding: 2px 6px; border-radius: 3px; }
  pre { background: var(--code-bg); padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
  .sample-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .sample-head { display: flex; gap: 12px; align-items: center; font-size: 13px; }
  .sample-body { margin-top: 8px; font-size: 13px; }
  .sample-body > div { margin: 6px 0; }
  .sample-body .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tool-call {
    margin: 4px 0; padding: 6px 10px; background: var(--code-bg); border-radius: 3px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
  }
  .heatmap td.cell { text-align: center; font-weight: 600; color: white; }
  .heatmap td { border: 1px solid var(--border); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .breadcrumb { font-size: 13px; margin-bottom: 16px; }
  .breadcrumb a { cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>LiteBench</h1>
  <span class="tag" id="version-tag">loading…</span>
</header>
<nav>
  <button data-view="runs" class="active">Runs</button>
  <button data-view="compare">Compare</button>
  <button data-view="tasks">Tasks</button>
</nav>
<main id="app">loading…</main>

<script>
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => r.querySelectorAll(s);

function accClass(a) {
  if (a >= 0.8) return "good";
  if (a < 0.5) return "bad";
  return "";
}

function fmtPct(n) { return (n * 100).toFixed(1) + "%"; }
function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString([], { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}
function shortRun(id) { return id.slice(0, 8); }

function accColor(acc) {
  // red (0) → yellow (.5) → green (1)
  const r = acc < 0.5 ? 220 : Math.round(220 - (acc - 0.5) * 2 * 170);
  const g = acc < 0.5 ? Math.round(acc * 2 * 200) : 200;
  return `rgb(${r}, ${g}, 80)`;
}

async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`${url}: ${resp.status}`);
  return resp.json();
}

async function renderRuns() {
  const runs = await fetchJSON("/api/runs?limit=200");
  if (runs.length === 0) {
    return `<div class="empty">No runs yet. Try <code>litebench run gsm8k -m gpt-4o-mini -n 20</code> in your terminal.</div>`;
  }
  const rows = runs.map(r => `
    <tr class="clickable" data-run="${r.run_id}">
      <td class="mono">${shortRun(r.run_id)}</td>
      <td>${r.task}</td>
      <td class="mono">${r.model}</td>
      <td>${r.n_samples}</td>
      <td class="acc ${accClass(r.accuracy)}">${fmtPct(r.accuracy)}</td>
      <td>${Math.round(r.mean_latency_ms)} ms</td>
      <td class="muted">${fmtTime(r.finished_at)}</td>
    </tr>`).join("");
  return `
    <table>
      <thead><tr>
        <th>Run</th><th>Task</th><th>Model</th><th>N</th><th>Accuracy</th><th>Latency</th><th>When</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function renderRunDetail(runId) {
  const data = await fetchJSON(`/api/runs/${runId}`);
  const s = data.summary;
  const samples = data.samples;

  const summaryHTML = `
    <div class="breadcrumb"><a onclick="navigate('runs')">← All runs</a></div>
    <h2 style="margin: 0 0 8px">${s.task} · <span class="mono">${s.model}</span></h2>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0;">
      <div><div class="label muted" style="font-size:11px;text-transform:uppercase">Accuracy</div>
           <div style="font-size:24px;font-weight:700" class="acc ${accClass(s.accuracy)}">${fmtPct(s.accuracy)}</div>
           <div class="muted" style="font-size:12px">${s.n_correct} / ${s.n_samples}</div></div>
      <div><div class="label muted" style="font-size:11px;text-transform:uppercase">Mean latency</div>
           <div style="font-size:24px;font-weight:700">${Math.round(s.mean_latency_ms)} ms</div></div>
      <div><div class="label muted" style="font-size:11px;text-transform:uppercase">Tokens (p / c)</div>
           <div style="font-size:18px;font-weight:600">${s.total_prompt_tokens.toLocaleString()} / ${s.total_completion_tokens.toLocaleString()}</div></div>
      <div><div class="label muted" style="font-size:11px;text-transform:uppercase">Run ID</div>
           <div class="mono" style="font-size:14px">${shortRun(s.run_id)}</div>
           <div class="muted" style="font-size:12px">${fmtTime(s.finished_at)}</div></div>
    </div>
    <div>
      <div class="label muted" style="font-size:11px;text-transform:uppercase">System Prompt</div>
      <pre>${s.system_prompt}</pre>
    </div>
    <hr>
    <h3 style="margin:24px 0 8px">Samples</h3>`;

  const sampleHTML = samples.map(sp => {
    const toolCallsHTML = sp.tool_calls && sp.tool_calls.length
      ? sp.tool_calls.map(tc => {
          const args = typeof tc.arguments === "string" ? tc.arguments : JSON.stringify(tc.arguments);
          return `<div class="tool-call">→ <b>${tc.name}</b>(${escapeHtml(args)}) = ${escapeHtml(String(tc.result).slice(0, 200))}</div>`;
        }).join("")
      : "";
    const predTruncated = (sp.prediction || "").slice(0, 500);
    return `
      <div class="sample-row">
        <div class="sample-head">
          <span class="mono muted">${sp.sample_id}</span>
          <span class="chip ${accClass(sp.score)}" style="color:${sp.correct ? 'var(--good)' : 'var(--bad)'}">${sp.correct ? '✓ correct' : '✗ wrong'}</span>
          <span class="muted">${sp.latency_ms} ms</span>
          ${sp.error ? `<span class="chip" style="color:var(--bad)">error</span>` : ''}
        </div>
        <div class="sample-body">
          <div><span class="label">target</span> <span class="mono">${escapeHtml(String(sp.target).slice(0, 200))}</span></div>
          ${toolCallsHTML ? `<div><span class="label">tool calls</span>${toolCallsHTML}</div>` : ''}
          <div><span class="label">prediction</span><pre>${escapeHtml(predTruncated)}${sp.prediction.length > 500 ? '\n…' : ''}</pre></div>
          ${sp.error ? `<div><span class="label">error</span><pre style="color:var(--bad)">${escapeHtml(sp.error)}</pre></div>` : ''}
        </div>
      </div>`;
  }).join("");

  return summaryHTML + sampleHTML;
}

async function renderCompare() {
  const data = await fetchJSON("/api/compare");
  if (data.cells.length === 0) {
    return `<div class="empty">No runs to compare yet.</div>`;
  }
  const byKey = {};
  for (const c of data.cells) byKey[`${c.task}|${c.model}`] = c;
  const header = `<tr><th></th>${data.tasks.map(t => `<th>${t}</th>`).join("")}</tr>`;
  const rows = data.models.map(m => {
    const cells = data.tasks.map(t => {
      const c = byKey[`${t}|${m}`];
      if (!c) return `<td class="muted" style="text-align:center">—</td>`;
      return `<td class="cell" style="background:${accColor(c.accuracy)}" title="${c.n_samples} samples · run ${shortRun(c.run_id)}">${fmtPct(c.accuracy)}</td>`;
    }).join("");
    return `<tr><th class="mono">${m}</th>${cells}</tr>`;
  }).join("");
  return `
    <p class="muted" style="font-size:13px">Most recent run per (task, model) pair. Click a cell's tooltip to see which run.</p>
    <table class="heatmap">
      <thead>${header}</thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function renderTasks() {
  const tasks = await fetchJSON("/api/tasks");
  const rows = tasks.map(t => `<tr><td class="mono">${t.name}</td><td>${t.description || ''}</td></tr>`).join("");
  return `
    <p class="muted" style="font-size:13px">Built-in tasks available via <code class="mono">litebench run &lt;name&gt;</code>.</p>
    <table>
      <thead><tr><th>Name</th><th>Description</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

async function navigate(view, param) {
  $$("nav button").forEach(b => b.classList.toggle("active", b.dataset.view === view));
  const main = $("#app");
  main.textContent = "loading…";
  try {
    if (view === "runs") main.innerHTML = await renderRuns();
    else if (view === "run-detail") main.innerHTML = await renderRunDetail(param);
    else if (view === "compare") main.innerHTML = await renderCompare();
    else if (view === "tasks") main.innerHTML = await renderTasks();
    // Wire up run detail links on the runs tab.
    $$("tr.clickable").forEach(row => {
      row.addEventListener("click", () => navigate("run-detail", row.dataset.run));
    });
  } catch (e) {
    main.innerHTML = `<div class="empty">Error: ${escapeHtml(e.message)}</div>`;
  }
}

$$("nav button").forEach(b => {
  b.addEventListener("click", () => navigate(b.dataset.view));
});

// Expose navigate for the breadcrumb "← All runs" link.
window.navigate = navigate;

(async () => {
  try {
    const meta = await fetchJSON("/openapi.json");
    $("#version-tag").textContent = `v${meta.info.version}`;
  } catch {}
  navigate("runs");
})();
</script>
</body>
</html>
